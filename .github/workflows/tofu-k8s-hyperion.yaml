name: "Tofu :: k8s hyperion"

on:
  push:
    branches: ["main"]
    paths: ["terraform/proxmox/infraestructure/hyperion**"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  plan:
    name: "🧪 Plan"
    runs-on: self-hosted
    container:
      image: brsalcedom/homelab-ci:2.2.0
    defaults:
      run:
        working-directory: terraform/proxmox/infraestructure/hyperion

    steps:
      - name: 🧾 Checkout
        uses: actions/checkout@v6

      - name: 🔐 Get secrets from Bitwarden
        uses: bitwarden/sm-action@v3.0.0
        id: secrets-bw
        with:
          access_token: ${{ secrets.BW_TOKEN }}
          base_url: https://vault.bitwarden.com
          secrets: |
            64cc2302-5345-4eea-8c9a-b3390140117c > AWS_ACCESS_KEY_ID
            6184035e-bb14-488a-b14e-b33901403af8 > AWS_SECRET_ACCESS_KEY
            ef57c68e-c227-4ff8-8dbe-b32c014db0b0 > CLOUDFLARE_API_TOKEN
            d8904601-600e-44d0-b8ec-b3400043b0d0 > INFISICAL_API_TOKEN
            15ca2e09-2662-4cec-badd-b33e00052a68 > KUBECONFIG

      - name: 📝 Write kubeconfig
        env: 
          KUBECONFIG: ${{ steps.secrets-bw.outputs.KUBECONFIG }}
        run: |
          mkdir -p /root/.kube
          printf "%s" "${KUBECONFIG}" > /root/.kube/config
          chmod 600 /root/.kube/config

      - name: 📄 Write .env for Task
        env: 
          CLOUDFLARE_API_TOKEN: ${{ steps.secrets-bw.outputs.CLOUDFLARE_API_TOKEN }}
          INFISICAL_API_TOKEN: ${{ steps.secrets-bw.outputs.INFISICAL_API_TOKEN }}
        run: |
          cat <<EOF > .env
          CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
          INFISICAL_API_TOKEN=${INFISICAL_API_TOKEN}
          KUBECONFIG=/root/.kube/config
          EOF

      - name: ⚙️ Run bootstrap task
        env:
          KUBECONFIG: "/root/.kube/config"
        run: |
          task --taskfile $GITHUB_WORKSPACE/.github/tasks/hyperion-bootstrap.yml

      - name: ⚙️ Init & Plan
        env: 
          KUBE_CONFIG_PATH: "/root/.kube/config"
        run: |
          tofu init -input=false
          tofu plan -input=false -out=tfplan

      - name: 📦 Upload Plan
        uses: actions/upload-artifact@v7
        with:
          name: tfplan
          path: terraform/proxmox/infraestructure/hyperion/tfplan
          retention-days: 1

  apply:
    name: "🚀 Apply"
    needs: plan
    runs-on: self-hosted
    container:
      image: brsalcedom/homelab-ci:2.2.0
    environment:
      name: tofu-infra
    defaults:
      run:
        working-directory: terraform/proxmox/infraestructure/hyperion

    steps:
      - name: 🧾 Checkout
        uses: actions/checkout@v6
      
      - name: 🔐 Get secrets from Bitwarden
        uses: bitwarden/sm-action@v3.0.0
        id: secrets-bw
        with:
          access_token: ${{ secrets.BW_TOKEN }}
          base_url: https://vault.bitwarden.com
          secrets: |
            64cc2302-5345-4eea-8c9a-b3390140117c > AWS_ACCESS_KEY_ID
            6184035e-bb14-488a-b14e-b33901403af8 > AWS_SECRET_ACCESS_KEY
            ef57c68e-c227-4ff8-8dbe-b32c014db0b0 > CLOUDFLARE_API_TOKEN
            d8904601-600e-44d0-b8ec-b3400043b0d0 > INFISICAL_API_TOKEN
            15ca2e09-2662-4cec-badd-b33e00052a68 > KUBECONFIG

      - name: 📝 Write kubeconfig
        env: 
          KUBECONFIG: ${{ steps.secrets-bw.outputs.KUBECONFIG }}
        run: |
          mkdir -p /root/.kube
          printf "%s" "${KUBECONFIG}" > /root/.kube/config
          chmod 600 /root/.kube/config

      - name: 📄 Write .env for Task
        env: 
          CLOUDFLARE_API_TOKEN: ${{ steps.secrets-bw.outputs.CLOUDFLARE_API_TOKEN }}
          INFISICAL_API_TOKEN: ${{ steps.secrets-bw.outputs.INFISICAL_API_TOKEN }}
        run: |
          cat <<EOF > .env
          CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
          INFISICAL_API_TOKEN=${INFISICAL_API_TOKEN}
          KUBECONFIG=/root/.kube/config
          EOF

      - name: ⚙️ Run bootstrap task
        env:
          KUBECONFIG: "/root/.kube/config"
        run: |
          task --taskfile $GITHUB_WORKSPACE/.github/tasks/hyperion-bootstrap.yml

      - name: 📥 Download Plan
        uses: actions/download-artifact@v8
        with:
          name: tfplan
          path: terraform/proxmox/infraestructure/hyperion

      - name: ✅ Apply Plan
        env: 
          KUBE_CONFIG_PATH: "/root/.kube/config"
          KUBECONFIG: "/root/.kube/config"
        run: |
          tofu init -input=false
          tofu apply -auto-approve tfplan
