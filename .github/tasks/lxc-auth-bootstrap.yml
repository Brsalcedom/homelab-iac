version: '3'

dotenv: [".env"]

vars:
  LXC_USER: '{{default "root" .LXC_USER}}'
  SSH_PORT: '{{default "22" .SSH_PORT}}'

tasks:
  default:
    desc: "Bootstrap LXC Authentik"
    deps: [install-docker-remote]

  install-docker-remote:
    desc: "Install Docker in target LXC via SSH"
    requires:
      vars: [LXC_HOST]
    cmds:
      - |
        ssh {{if .SSH_KEY_PATH}}-i {{.SSH_KEY_PATH}}{{end}} -p {{.SSH_PORT}} -o StrictHostKeyChecking=accept-new {{.LXC_USER}}@{{.LXC_HOST}} 'bash -se' <<'EOF'
        apt update
        apt install -y ca-certificates curl
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
        tee /etc/apt/sources.list.d/docker.sources <<EOS
        Types: deb
        URIs: https://download.docker.com/linux/debian
        Suites: $(. /etc/os-release && echo "$VERSION_CODENAME")
        Components: stable
        Signed-By: /etc/apt/keyrings/docker.asc
        EOS
        apt update
        apt install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
        systemctl enable --now docker
        EOF

