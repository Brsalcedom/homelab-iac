services:
  mongo:
    image: mongo:7
    container_name: komodo-mongo
    command:
      - --quiet
      - --wiredTigerCacheSizeGB
      - ${MONGO_CACHE_GB:-0.25}
    restart: unless-stopped
    volumes:
      - komodo-mongo-data:/data/db
      - komodo-mongo-config:/data/configdb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${KOMODO_DB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${KOMODO_DB_PASSWORD}

  core:
    image: ghcr.io/moghtech/komodo-core:${COMPOSE_KOMODO_IMAGE_TAG:-latest}
    container_name: komodo-core
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "${KOMODO_CORE_PORT:-9120}:9120"
    environment:
      KOMODO_DATABASE_ADDRESS: mongo:27017
      KOMODO_DATABASE_USERNAME: ${KOMODO_DB_USERNAME}
      KOMODO_DATABASE_PASSWORD: ${KOMODO_DB_PASSWORD}
      KOMODO_HOST: ${KOMODO_HOST}
      KOMODO_PASSKEY: ${KOMODO_PASSKEY}
      KOMODO_FIRST_SERVER: ${KOMODO_FIRST_SERVER:-https://periphery:8120}
      KOMODO_FIRST_SERVER_NAME: ${KOMODO_FIRST_SERVER_NAME:-lxc-monitoring}
      KOMODO_LOCAL_AUTH: ${KOMODO_LOCAL_AUTH:-true}
      KOMODO_OIDC_ENABLED: ${KOMODO_OIDC_ENABLED:-false}
      KOMODO_OIDC_PROVIDER: ${KOMODO_OIDC_PROVIDER}
      KOMODO_OIDC_CLIENT_ID: ${KOMODO_OIDC_CLIENT_ID}
      KOMODO_OIDC_CLIENT_SECRET: ${KOMODO_OIDC_CLIENT_SECRET}
      KOMODO_ENABLE_NEW_USERS: ${KOMODO_ENABLE_NEW_USERS:-false}
    volumes:
      - ${COMPOSE_KOMODO_BACKUPS_PATH:-./komodo-backups}:/backups

  periphery:
    image: ghcr.io/moghtech/komodo-periphery:${COMPOSE_KOMODO_IMAGE_TAG:-latest}
    container_name: komodo-periphery
    restart: unless-stopped
    depends_on:
      - core
    environment:
      PERIPHERY_ROOT_DIRECTORY: ${PERIPHERY_ROOT_DIRECTORY:-/etc/komodo}
      PERIPHERY_PASSKEYS: ${PERIPHERY_PASSKEYS}
      PERIPHERY_DISABLE_TERMINALS: ${PERIPHERY_DISABLE_TERMINALS:-false}
      PERIPHERY_INCLUDE_DISK_MOUNTS: ${PERIPHERY_INCLUDE_DISK_MOUNTS:-/etc/hostname}
      PERIPHERY_SSL_ENABLED: ${PERIPHERY_SSL_ENABLED:-true}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/proc
      - ${PERIPHERY_ROOT_DIRECTORY:-/etc/komodo}:${PERIPHERY_ROOT_DIRECTORY:-/etc/komodo}
    ports:
      - "${PERIPHERY_PORT:-8120}:8120"

volumes:
  komodo-mongo-data:
  komodo-mongo-config:
