name: "Bootstrap :: LXC auth"

on:
  workflow_dispatch:
    inputs:
      lxc_host:
        description: "Target LXC IP/hostname"
        required: false
        default: "192.168.1.170"
      lxc_user:
        description: "SSH user"
        required: false
        default: "root"
      ssh_port:
        description: "SSH port"
        required: false
        default: "22"

permissions:
  contents: read

jobs:
  bootstrap-auth:
    name: "🚀 Bootstrap Docker on auth LXC"
    runs-on: self-hosted
    container:
      image: brsalcedom/homelab-ci:2.5.0

    steps:
      - name: 🧾 Checkout
        uses: actions/checkout@v6

      - name: 🔐 Get secrets from Bitwarden
        uses: bitwarden/sm-action@v2
        id: secrets-bw
        with:
          access_token: ${{ secrets.BW_TOKEN }}
          base_url: https://vault.bitwarden.com
          secrets: |
            f5a47b3b-df1e-4b6b-9d46-b4120005336a > LXC_SSH_PRIVATE_KEY
            d0c1c6b0-4a80-46dc-bc65-b412000ba495 > AUTHENTIK_PG_PASS
            95822750-ce03-4930-bb05-b412000bb93f > AUTHENTIK_SECRET_KEY

      - name: 🔒 Mask sensitive secrets from logs
        run: |
          echo "::add-mask::${{ steps.secrets-bw.outputs.LXC_SSH_PRIVATE_KEY }}"
          echo "::add-mask::${{ steps.secrets-bw.outputs.AUTHENTIK_PG_PASS }}"
          echo "::add-mask::${{ steps.secrets-bw.outputs.AUTHENTIK_SECRET_KEY }}"

      - name: 🔑 Write SSH private key
        env:
          LXC_SSH_PRIVATE_KEY: ${{ steps.secrets-bw.outputs.LXC_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "${LXC_SSH_PRIVATE_KEY}" ]; then
            echo "Missing required Bitwarden secret output: LXC_SSH_PRIVATE_KEY"
            exit 1
          fi
          mkdir -p /root/.ssh
          printf "%s" "${LXC_SSH_PRIVATE_KEY}" > /root/.ssh/lxc_auth_key
          chmod 600 /root/.ssh/lxc_auth_key

      - name: ✅ Validate compose source in runner checkout
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/docker/compose/lxc-auth/authentik.yaml" ]; then
            echo "[ERROR] Compose file not found in checkout: $GITHUB_WORKSPACE/docker/compose/lxc-auth/authentik.yaml"
            exit 1
          fi
          echo "[INFO] Compose source found in runner checkout"

      - name: 📄 Write .env for Authentik task
        env:
          AUTHENTIK_PG_PASS: ${{ steps.secrets-bw.outputs.AUTHENTIK_PG_PASS }}
          AUTHENTIK_SECRET_KEY: ${{ steps.secrets-bw.outputs.AUTHENTIK_SECRET_KEY }}
        run: |
          cat <<EOF > $GITHUB_WORKSPACE/.env
          PG_PASS=${AUTHENTIK_PG_PASS}
          AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY}
          EOF
          chmod 600 $GITHUB_WORKSPACE/.env

      - name: ⚙️ Run bootstrap task (Docker + Authentik)
        env:
          LXC_HOST: ${{ github.event.inputs.lxc_host }}
          LXC_USER: ${{ github.event.inputs.lxc_user }}
          SSH_PORT: ${{ github.event.inputs.ssh_port }}
          SSH_KEY_PATH: /root/.ssh/lxc_auth_key
          AUTHENTIK_COMPOSE_SOURCE: ${{ github.workspace }}/docker/compose/lxc-auth/authentik.yaml
          AUTHENTIK_ENV_SOURCE: ${{ github.workspace }}/.env
        run: |
          task --silent --taskfile $GITHUB_WORKSPACE/.github/tasks/lxc-auth-bootstrap.yml
