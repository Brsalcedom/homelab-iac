version: '3'

dotenv: [".env"]

vars:
  LXC_USER: '{{env "LXC_USER" | default "root"}}'
  SSH_PORT: '{{env "SSH_PORT" | default "22"}}'
  SSH_KEY_PATH: '{{env "SSH_KEY_PATH"}}'
  LXC_HOST: '{{env "LXC_HOST"}}'
  AUTHENTIK_REPO: '{{default "https://github.com/Brsalcedom/homelab-iac.git" .AUTHENTIK_REPO}}'
  AUTHENTIK_REPO_PATH: '{{default "/opt/authentik" .AUTHENTIK_REPO_PATH}}'
  PG_DB: '{{default "authentik" .PG_DB}}'
  PG_USER: '{{default "authentik" .PG_USER}}'
  PG_PASS: '{{env "AUTHENTIK_PG_PASS"}}'
  AUTHENTIK_SECRET_KEY: '{{env "AUTHENTIK_SECRET_KEY"}}'
  AUTHENTIK_IMAGE: '{{default "ghcr.io/goauthentik/server" .AUTHENTIK_IMAGE}}'
  AUTHENTIK_TAG: '{{default "2026.2.1" .AUTHENTIK_TAG}}'
  COMPOSE_PORT_HTTP: '{{default "9000" .COMPOSE_PORT_HTTP}}'
  COMPOSE_PORT_HTTPS: '{{default "9443" .COMPOSE_PORT_HTTPS}}'

tasks:
  default:
    desc: "Bootstrap LXC Authentik: Docker + .env + docker-compose stack"
    deps: [install-docker-remote, deploy-authentik-stack]

  install-docker-remote:
    desc: "Install Docker in target LXC via SSH"
    requires:
      vars: [LXC_HOST]
    cmds:
      - |
        ssh {{if .SSH_KEY_PATH}}-i {{.SSH_KEY_PATH}}{{end}} -p {{.SSH_PORT}} -o StrictHostKeyChecking=accept-new {{.LXC_USER}}@{{.LXC_HOST}} bash <<'EOF'
        set -e
        set +x
        # Check if Docker is already installed
        if command -v docker &>/dev/null; then
          echo "[INFO] Docker already installed. Verifying service status..."
          systemctl is-active --quiet docker || systemctl start docker
          systemctl is-enabled --quiet docker || systemctl enable docker
          echo "[INFO] Bootstrap idempotent exit (Docker already present)"
          exit 0
        fi
        
        echo "[INFO] Installing Docker prerequisites..."
        apt update
        apt install -y ca-certificates curl || exit 1
        
        echo "[INFO] Setting up Docker APT key..."
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc || exit 1
        chmod a+r /etc/apt/keyrings/docker.asc
        
        echo "[INFO] Adding Docker repository..."
        tee /etc/apt/sources.list.d/docker.sources <<EOS
        Types: deb
        URIs: https://download.docker.com/linux/debian
        Suites: $(. /etc/os-release && echo "$VERSION_CODENAME")
        Components: stable
        Signed-By: /etc/apt/keyrings/docker.asc
        EOS
        
        echo "[INFO] Updating package index..."
        apt update || exit 1
        
        echo "[INFO] Installing Docker packages..."
        apt install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin || exit 1
        
        echo "[INFO] Enabling and starting Docker service..."
        systemctl enable --now docker || exit 1
        
        echo "[INFO] Docker bootstrap completed successfully"
        EOF

  generate-env:
    desc: "Generate .env file for Authentik on remote LXC"
    requires:
      vars: [LXC_HOST, PG_PASS, AUTHENTIK_SECRET_KEY]
    cmds:
      - |
        ssh {{if .SSH_KEY_PATH}}-i {{.SSH_KEY_PATH}}{{end}} -p {{.SSH_PORT}} -o StrictHostKeyChecking=accept-new {{.LXC_USER}}@{{.LXC_HOST}} bash <<'EOF'
        set -e
        set +x
        echo "[INFO] Creating .env for Authentik..."

        if [ ! -f "{{.AUTHENTIK_REPO_PATH}}/docker/compose/authentik.yaml" ]; then
          echo "[ERROR] Compose file not found at {{.AUTHENTIK_REPO_PATH}}/docker/compose/authentik.yaml"
          echo "[ERROR] Run clone-compose task before generate-env."
          exit 1
        fi

        cd {{.AUTHENTIK_REPO_PATH}}/docker/compose
        
        # Generate .env file in the same directory as compose
        cat > .env <<ENVEOF
        PG_DB={{.PG_DB}}
        PG_USER={{.PG_USER}}
        PG_PASS={{.PG_PASS}}
        AUTHENTIK_SECRET_KEY={{.AUTHENTIK_SECRET_KEY}}
        AUTHENTIK_IMAGE={{.AUTHENTIK_IMAGE}}
        AUTHENTIK_TAG={{.AUTHENTIK_TAG}}
        COMPOSE_PORT_HTTP={{.COMPOSE_PORT_HTTP}}
        COMPOSE_PORT_HTTPS={{.COMPOSE_PORT_HTTPS}}
        ENVEOF
        
        chmod 600 .env
        echo "[INFO] .env file generated at {{.AUTHENTIK_REPO_PATH}}/docker/compose/.env"
        EOF

  clone-compose:
    desc: "Clone repository with docker-compose for Authentik"
    requires:
      vars: [LXC_HOST]
    cmds:
      - |
        ssh {{if .SSH_KEY_PATH}}-i {{.SSH_KEY_PATH}}{{end}} -p {{.SSH_PORT}} -o StrictHostKeyChecking=accept-new {{.LXC_USER}}@{{.LXC_HOST}} bash <<'EOF'
        set -e
        set +x
        echo "[INFO] Cloning authentik compose from {{.AUTHENTIK_REPO}}..."

        if [ -d "{{.AUTHENTIK_REPO_PATH}}/.git" ]; then
          echo "[INFO] Git repository exists. Pulling latest changes..."
          git -C {{.AUTHENTIK_REPO_PATH}} pull --ff-only origin main
        elif [ -d "{{.AUTHENTIK_REPO_PATH}}" ]; then
          backup_path="{{.AUTHENTIK_REPO_PATH}}.bak.$(date +%s)"
          echo "[WARN] {{.AUTHENTIK_REPO_PATH}} exists but is not a git repository."
          echo "[WARN] Moving existing directory to ${backup_path}"
          mv {{.AUTHENTIK_REPO_PATH}} "${backup_path}"
          git clone {{.AUTHENTIK_REPO}} {{.AUTHENTIK_REPO_PATH}}
        else
          git clone {{.AUTHENTIK_REPO}} {{.AUTHENTIK_REPO_PATH}}
        fi

        cd {{.AUTHENTIK_REPO_PATH}}
        
        echo "[INFO] Repository ready at {{.AUTHENTIK_REPO_PATH}}"
        EOF

  deploy-authentik-stack:
    desc: "Deploy Authentik docker-compose stack"
    requires:
      vars: [LXC_HOST, PG_PASS, AUTHENTIK_SECRET_KEY]
    cmds:
      - task: install-docker-remote
      - task: clone-compose
      - task: generate-env
      - |
        ssh {{if .SSH_KEY_PATH}}-i {{.SSH_KEY_PATH}}{{end}} -p {{.SSH_PORT}} -o StrictHostKeyChecking=accept-new {{.LXC_USER}}@{{.LXC_HOST}} bash <<'EOF'
        set -e
        set +x
        echo "[INFO] Starting Authentik docker-compose stack..."
        
        cd {{.AUTHENTIK_REPO_PATH}}/docker/compose
        
        if [ ! -f ".env" ]; then
          echo "[ERROR] .env not found. Run generate-env task first."
          exit 1
        fi
        
        echo "[INFO] Pulling latest images..."
        docker-compose -f authentik.yaml pull
        
        echo "[INFO] Starting services..."
        docker-compose -f authentik.yaml up -d
        
        echo "[INFO] Waiting for services to be ready..."
        sleep 10
        
        echo "[INFO] Checking service status..."
        docker-compose -f authentik.yaml ps
        
        echo "[INFO] Authentik stack deployed successfully"
        echo "[INFO] Access at: http://{{.LXC_HOST}}:{{.COMPOSE_PORT_HTTP}}"
        EOF

