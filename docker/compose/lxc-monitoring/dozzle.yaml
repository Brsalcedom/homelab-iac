services:
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    ports:
      - "${DOZZLE_PORT:-8088}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOZZLE_LEVEL=${DOZZLE_LEVEL:-info}
      - DOZZLE_NO_ANALYTICS=true
    restart: unless-stopped
